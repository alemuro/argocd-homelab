name: homedb
image: mariadb
tag: "12.3"
port: 3306
servicePort: 3306
node_selector:
  kubernetes.io/hostname: worker-1
mount:
  /mnt/local/configs/homedb: /var/lib/mysql
pod_additional_ports:
  - name: mysql
    container_port: 3306
    host_port: 3306
    protocol: TCP
env:
  PUID: 1000
  GUID: 1000
  TZ: Europe/Madrid
  MYSQL_ALLOW_EMPTY_PASSWORD: "true"
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits: {}
allow_from:
  - umami
  - n8n
  - georeptes-api
  - phpmyadmin
  - nextcloud
allow_from_cidrs:
  - 0.0.0.0/0
