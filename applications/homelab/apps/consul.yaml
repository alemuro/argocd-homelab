name: consul
image: hashicorp/consul
tag: "1.20"
port: 8500
domains:
  - consul.immaleix.casa
node_selector:
  kubernetes.io/hostname: worker-1
mount:
  /mnt/local/configs/consul: /consul/data
args:
  - agent
  - -server
  - -data-dir=/consul/data
  - -bootstrap
  - -client=0.0.0.0
  - -advertise=127.0.0.1
  - -ui
