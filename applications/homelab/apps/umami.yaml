name: umami
image: ghcr.io/umami-software/umami
tag: "mysql-v2.8.0"
port: 3000
domains:
  - umami.immaleix.casa
node_selector:
  kubernetes.io/hostname: worker-1
env:
  USER_UID: "1000"
  USER_GID: "1000"
  TZ: Europe/Madrid
image_updater:
  enabled: true
  strategy: semver
  allow_tags: "mysql-v*"
secretEnv:
  DATABASE_URL:
    secretName: umami-db
    key: MYSQL_URI
