apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: homelab-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: ssh://git@github.com/alemuro/argocd-homelab.git
        revision: HEAD
        files:
          - path: "applications/homelab/apps/*.yaml"
  template:
    metadata:
      name: "homelab-{{.name}}"
    spec:
      project: homelab
      source:
        path: helm/homelab-application
        repoURL: ssh://git@github.com/alemuro/argocd-homelab.git
        targetRevision: HEAD
        helm:
          values: |
            {{- toYaml . | nindent 12 }}
      destination:
        name: homelab
        namespace: homelab
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
          - ApplyOutOfSyncOnly=true
