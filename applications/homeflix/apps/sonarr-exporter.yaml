name: sonarr-exporter
image: ghcr.io/onedr0p/exportarr
tag: latest
port: 9707
node_selector:
  kubernetes.io/hostname: worker-0
image_updater:
  enabled: true
  strategy: semver
  allow_tags: "v*"
env:
  PORT: 9707
  URL: http://sonarr:80
secretEnv:
  APIKEY:
    secretName: sonarr-apikey
    key: SONARR_APIKEY
serviceAnnotations:
  k8s.grafana.com/scrape: "true"
  k8s.grafana.com/metrics.portName: http
  k8s.grafana.com/metrics.scheme: http
  k8s.grafana.com/metrics.path: /metrics
  k8s.grafana.com/metrics.scrapeInterval: 5m
args:
  - sonarr