name: tautulli
image: lscr.io/linuxserver/tautulli
tag: latest
port: 8181
node_selector:
  kubernetes.io/hostname: worker-0
domains:
  - tautulli.immaleix.casa
mount:
  /mnt/local/configs/tautulli: /config
image_updater:
  enabled: true
  strategy: semver
  allow_tags: "v*"
env:
  PUID: "1000"
  PGID: "1000"
  TZ: "Europe/Madrid"
allow_from:
  - wrapperr
  - seerr
  - oracularr
