name: radarr
image: lscr.io/linuxserver/radarr
tag: 6.0.4
port: 7878
node_selector:
  kubernetes.io/hostname: worker-0
domains:
  - radarr.immaleix.casa
mount:
  /mnt/local/configs/radarr: /config
  /mnt/nfs/homeflix-v2: /media
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
allow_from:
  - prowlarr
  - seerr
  - bazarr
  - maintainerr
  - radarr-exporter
  - sizeondisk-exporter
  - discovarr
  - oracularr
