name: sonarr
image: lscr.io/linuxserver/sonarr
tag: 4.0.16
port: 8989
node_selector:
  kubernetes.io/hostname: worker-0
domains:
  - sonarr.immaleix.casa
mount:
  /mnt/local/configs/sonarr: /config
  /mnt/nfs/homeflix-v2: /media
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
allow_from:
  - prowlarr
  - seerr
  - bazarr
  - maintainerr
  - sonarr-exporter
  - sizeondisk-exporter
  - discovarr
  - oracularr
image_updater:
  enabled: true
  strategy: semver
  allow_tags: "v*"
