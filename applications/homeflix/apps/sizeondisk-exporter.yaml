name: sizeondisk-exporter
image: ghcr.io/alemuro/arr-sizeondisk-exporter
tag: latest
port: 9101
node_selector:
  kubernetes.io/hostname: worker-0
image_updater:
  enabled: true
  strategy: semver
  allow_tags: "v*"
env:
  RADARR_HOST: http://radarr:80
  SONARR_HOST: http://sonarr:80
secretEnv:
  RADARR_APIKEY:
    secretName: radarr-apikey
    key: RADARR_APIKEY
  SONARR_APIKEY:
    secretName: sonarr-apikey
    key: SONARR_APIKEY
serviceAnnotations:
  k8s.grafana.com/scrape: "true"
  k8s.grafana.com/metrics.portName: http
  k8s.grafana.com/metrics.scheme: http
  k8s.grafana.com/metrics.path: /metrics
  k8s.grafana.com/metrics.scrapeInterval: 15m
