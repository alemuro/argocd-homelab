name: jackett
image: lscr.io/linuxserver/jackett
tag: latest
port: 9117
node_selector:
  kubernetes.io/hostname: worker-0
domains:
  - jackett.immaleix.casa
mount:
  /mnt/local/configs/jackett: /config
image_updater:
  enabled: true
  strategy: semver
  allow_tags: "v*"
env:
  PUID: "1000"
  PGID: "1000"
  TZ: "Europe/Madrid"
allow_from:
  - radarr
  - sonarr
  - lidarr
  - readarr
