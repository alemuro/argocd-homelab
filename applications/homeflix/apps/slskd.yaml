name: slskd
image: ghcr.io/slskd/slskd
tag: 0.24.5
port: 5030
node_selector:
  kubernetes.io/hostname: worker-0
domains:
  - slskd.immaleix.casa
mount:
  /mnt/local/configs/slskd: /app
  /mnt/nfs/homeflix-v2: /media
image_updater:
  enabled: true
  strategy: semver
  allow_tags: "v*"
env:
  SLSKD_REMOTE_CONFIGURATION: "true"
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi
allow_from:
  - soularr
