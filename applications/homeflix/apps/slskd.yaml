name: slskd
image: ghcr.io/slskd/slskd
tag: 0.24.1
port: 5030
domains:
  - slskd.immaleix.casa
mount:
  /mnt/local/configs/slskd: /app
  /mnt/nfs/homeflix-v2/music: /data
env:
  SLSKD_REMOTE_CONFIGURATION: "true"
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi
allow_from:
  - soularr
