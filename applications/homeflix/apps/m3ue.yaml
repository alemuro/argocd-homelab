name: m3ue
image: sparkison/m3u-editor
tag: latest
port: 36400
node_selector:
  kubernetes.io/hostname: worker-0
domains:
  - m3ue.immaleix.casa
mount:
  /mnt/local/configs/m3ue: /var/www/config
image_updater:
  enabled: true
  strategy: semver
  allow_tags: "v*"
env:
  TZ: Europe/Madrid
  APP_URL: https://m3ue.immaleix.casa
  M3U_PROXY_ENABLED: "true"
