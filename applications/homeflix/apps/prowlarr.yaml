name: prowlarr
image: lscr.io/linuxserver/prowlarr
tag: latest
port: 9696
node_selector:
  kubernetes.io/hostname: worker-0
domains:
  - prowlarr.immaleix.casa
mount:
  /mnt/local/configs/prowlarr: /config
image_updater:
  enabled: true
  strategy: semver
  allow_tags: "v*"
env:
  PUID: "1000"
  PGID: "1000"
  TZ: "Europe/Madrid"
allow_from:
  - radarr
  - sonarr
  - lidarr
  - readarr
