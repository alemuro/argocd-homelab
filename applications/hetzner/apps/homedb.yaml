name: homedb
image: mariadb
tag: "10.5"
port: 3306
# node_selector:
#   kubernetes.io/hostname: worker-0
node_selector: {}
mount:
  /mnt/local/configs/localdb: /var/lib/mysql
env:
  MYSQL_ALLOW_EMPTY_PASSWORD: "true"
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi
