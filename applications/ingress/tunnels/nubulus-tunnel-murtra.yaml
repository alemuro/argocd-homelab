apiVersion: apps/v1
kind: Deployment
metadata:
  name: nubulus-tunnel-murtra
  namespace: ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nubulus-tunnel-murtra
  template:
    metadata:
      labels:
        app: nubulus-tunnel-murtra
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: tunnel
          image: code.as210469.net/nubulusnetworkopensource/tunnel:v3.0.0
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 9990
          env:
            - name: METRICS_LISTEN_ADDR
              value: 0.0.0.0:9990
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nubulus-tunnel-murtra
                  key: TUNNEL_TOKEN
---
apiVersion: v1
kind: Service
metadata:
  name: nubulus-tunnel-murtra
  namespace: ingress
  annotations:
    k8s.grafana.com/scrape: "true"
    k8s.grafana.com/metrics.portName: metrics
    k8s.grafana.com/metrics.path: /metrics
    k8s.grafana.com/metrics.scheme: http
    k8s.grafana.com/metrics.scrapeInterval: 5m
spec:
  selector:
    app: nubulus-tunnel-murtra
  ports:
    - name: metrics
      port: 9990
      targetPort: metrics
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: nubulus-tunnel-murtra
  namespace: ingress
spec:
  encryptedData:
    TUNNEL_TOKEN: 
  template:
    metadata:
      creationTimestamp: null
      name: nubulus-tunnel-murtra
      namespace: ingress