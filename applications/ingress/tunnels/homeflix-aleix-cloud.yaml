apiVersion: apps/v1
kind: Deployment
metadata:
  name: nubulus-tunnel
  namespace: ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nubulus-tunnel
  template:
    metadata:
      labels:
        app: nubulus-tunnel
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: tunnel
          image: code.as210469.net/nubulusnetworkopensource/tunnel:v2.1.0
          imagePullPolicy: Always
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nubulus-tunnel
                  key: TUNNEL_TOKEN
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: nubulus-tunnel
  namespace: ingress
spec:
  encryptedData:
    TUNNEL_TOKEN: 
  template:
    metadata:
      creationTimestamp: null
      name: nubulus-tunnel
      namespace: ingress