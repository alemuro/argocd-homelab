apiVersion: apps/v1
kind: Deployment
metadata:
  name: "homeflix-aleix-cloud"
  namespace: ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "homeflix-aleix-cloud"
  template:
    metadata:
      labels:
        app: "homeflix-aleix-cloud"
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: tunnel
          image: code.as210469.net/nubulusnetworkopensource/tunnel:v2.0.0
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homeflix-aleix-cloud-tunnel
                  key: TUNNEL_TOKEN
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: homeflix-aleix-cloud-tunnel
  namespace: ingress
spec:
  encryptedData:
    TUNNEL_TOKEN: 
  template:
    metadata:
      creationTimestamp: null
      name: homeflix-aleix-cloud-tunnel
      namespace: ingress
