{{- if eq (include "homelab-application.hasHostPort" .) "true" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.name }}
  labels:
    app: {{ .Values.name }}
    k8s-app: {{ .Values.name }}
spec:
  replicas: 1
  serviceName: {{ .Values.name }}
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: {{ .Values.name }}
      k8s-app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
        k8s-app: {{ .Values.name }}
    spec:
      {{- if or .Values.node_selector .Values.nodeSelector }}
      nodeSelector:
        {{- if .Values.node_selector }}
        {{- toYaml .Values.node_selector | nindent 8 }}
        {{- else }}
        {{- toYaml .Values.nodeSelector | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.name }}
          image: "{{ .Values.image }}:{{ .Values.tag }}"
          {{- if or .Values.port .Values.pod_additional_ports }}
          ports:
            {{- if .Values.port }}
            - containerPort: {{ .Values.port }}
              name: http
              protocol: TCP
            {{- end }}
            {{- range .Values.pod_additional_ports }}
            - name: {{ .name }}
              containerPort: {{ .container_port }}
              {{- if .host_port }}
              hostPort: {{ .host_port }}
              {{- end }}
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}
          {{- end }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- range $key, $val := .Values.secretEnv }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $val.secretName }}
                  key: {{ $val.key }}
            {{- end }}
          {{- if .Values.command }}
          command:
            {{- toYaml .Values.command | nindent 12 }}
          {{- end }}
          {{- if .Values.args }}
          args:
            {{- toYaml .Values.args | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.probes.readiness }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          {{- else if .Values.port }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- end }}
          {{- with .Values.probes.liveness }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.probes.startup }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- range $hostPath, $mountPath := .Values.mount }}
            - name: {{ $mountPath | replace "/" "" | replace "." "-" | lower | trunc 63 | trimSuffix "-" }}
              mountPath: {{ $mountPath }}
            {{- end }}
            {{- range $path, $content := .Values.configmaps }}
            - name: config-volume
              mountPath: {{ $path }}
              subPath: {{ $path | replace "/" "_" | trimPrefix "_" }}
            {{- end }}
      volumes:
        {{- range $hostPath, $mountPath := .Values.mount }}
        - name: {{ $mountPath | replace "/" "" | replace "." "-" | lower | trunc 63 | trimSuffix "-" }}
          hostPath:
            path: {{ $hostPath }}
        {{- end }}
        {{- if .Values.configmaps }}
        - name: config-volume
          configMap:
            name: {{ .Values.name }}-configs
        {{- end }}
{{- end }}
