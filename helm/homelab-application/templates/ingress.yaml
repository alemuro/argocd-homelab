{{- if and .Values.port .Values.domains -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: default
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: {{ .Values.name }}
    gethomepage.dev/icon: {{ .Values.name }}
spec:
  ingressClassName: traefik
  rules:
    {{- range .Values.domains }}
    - host: {{ . }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $.Values.name }}
                port:
                  number: 80
    {{- end }}
  tls:
    - hosts:
        {{- range .Values.domains }}
        - {{ . }}
        {{- end }}
      secretName: {{ .Values.name }}-tls
{{- end }}
---
{{- if and .Values.port .Values.cloudflare_domains }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}-cloudflare
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: default
spec:
  ingressClassName: cloudflare-tunnel
  rules:
    {{- range .Values.cloudflare_domains }}
    - host: {{ . }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $.Values.name }}
                port:
                  name: http
    {{- end }}
  tls:
    - hosts:
        {{- range .Values.cloudflare_domains }}
        - {{ . }}
        {{- end }}
      secretName: {{ .Values.name }}-cloudflare-tls
{{- end }}
