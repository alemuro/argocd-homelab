{{- if .Values.port -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}
  labels:
    app: {{ .Values.name }}
  {{- if .Values.serviceAnnotations }}
  annotations:
    {{- toYaml .Values.serviceAnnotations | nindent 4 }}
  {{- end }}
spec:
  ports:
    - port: 80
      targetPort: {{ .Values.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ .Values.name }}
{{- end }}
