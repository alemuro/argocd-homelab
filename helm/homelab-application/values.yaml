name: ""
image: ""
tag: "latest"
port: null
servicePort: 80
# pod_additional_ports in format: [{ name, container_port, host_port?, protocol }]
# When any entry has host_port, a StatefulSet is deployed instead of a Deployment
pod_additional_ports: []
domains: []
# Mounts in format: hostPath: mountPath
mount: {}
# configmaps in format: mountPath: content
configmaps: {}
resources: {}
# Kubernetes probes (liveness, readiness, startup). Pass the full K8s probe spec.
# If port is set and no readiness probe is configured, a default TCP readiness
# probe on that port is added automatically (initialDelaySeconds: 10, periodSeconds: 10).
# Example:
#   probes:
#     liveness:
#       httpGet:
#         path: /health
#         port: 8080
#       periodSeconds: 30
#     startup:
#       tcpSocket:
#         port: 8080
#       failureThreshold: 30
probes: {}
allow_from: []
env:
  PUID: "1000"
  PGID: "1000"
  TZ: "Europe/Madrid"
# secretEnv in format: ENV_NAME: { secretName: "...", key: "..." }
secretEnv: {}
command: []
args: []
serviceAnnotations: {}
nodeSelector: {}
node_selector: {}
imagePullSecrets: []
