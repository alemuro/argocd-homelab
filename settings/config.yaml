apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: argocd-settings
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - folder: applications/devops
          - folder: applications/platform
          - folder: applications/homeflix
          - folder: applications/homelab
          - folder: applications/ingress
          - folder: applications/other
  template:
    metadata:
      finalizers: []
      name: 'argocd-{{ .folder | replace "/" "-" }}'
    spec:
      project: argocd
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
      source:
        repoURL: ssh://git@github.com/alemuro/argocd-homelab.git
        targetRevision: HEAD
        path: "{{ .folder }}"
        directory:
          recurse: true
      destination:
        name: homelab
        namespace: argocd
